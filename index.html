<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BW Proxy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

  <div class="absolute inset-0 -z-10">
    <div class="absolute top-[-120px] left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-cyan-500/20 blur-[140px] rounded-full"></div>
    <div class="absolute bottom-[-150px] right-[-80px] w-[400px] h-[400px] bg-fuchsia-500/10 blur-[130px] rounded-full"></div>
  </div>

  <button
    class="absolute top-6 right-6 p-3 rounded-full bg-zinc-900/70 border border-zinc-800 hover:border-cyan-400 transition duration-300"
    aria-label="Settings"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-zinc-300 hover:text-cyan-400 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11.983 3.054a1 1 0 011.034 0l1.518.876a1 1 0 00.948.03l1.587-.68a1 1 0 011.28.52l.69 1.6a1 1 0 00.748.58l1.67.27a1 1 0 01.81.81l.27 1.67a1 1 0 00.58.748l1.6.69a1 1 0 01.52 1.28l-.68 1.587a1 1 0 00.03.948l.876 1.518a1 1 0 010 1.034l-.876 1.518a1 1 0 00-.03.948l.68 1.587a1 1 0 01-.52 1.28l-1.6.69a1 1 0 00-.58.748l-.27 1.67a1 1 0 01-.81.81l-1.67.27a1 1 0 00-.748.58l-.69 1.6a1 1 0 01-1.28.52l-1.587-.68a1 1 0 00-.948.03l-1.518.876a1 1 0 01-1.034 0l-1.518-.876a1 1 0 00-.948-.03l-1.587.68a1 1 0 01-1.28-.52l-.69-1.6a1 1 0 00-.748-.58l-1.67-.27a1 1 0 01-.81-.81l-.27-1.67a1 1 0 00-.58-.748l-1.6-.69a1 1 0 01-.52-1.28l.68-1.587a1 1 0 00-.03-.948l-.876-1.518a1 1 0 010-1.034l.876-1.518a1 1 0 00.03-.948l-.68-1.587a1 1 0 01.52-1.28l1.6-.69a1 1 0 00.58-.748l.27-1.67a1 1 0 01.81-.81l1.67-.27a1 1 0 00.748-.58l.69-1.6a1 1 0 011.28-.52l1.587.68a1 1 0 00.948-.03l1.518-.876z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
  </button>

  <main class="flex flex-col items-center justify-center min-h-screen px-6">
    <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-10 text-center">
      <span class="text-white">BW</span>
      <span class="text-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.8)]">Proxy</span>
    </h1>

    <div class="w-full max-w-2xl">
      <div class="relative group">
        <input
          id="user-input"
          type="text"
          placeholder="Search or enter URL..."
          class="w-full bg-zinc-900/80 text-white placeholder-zinc-500 rounded-2xl px-6 py-4 text-lg border border-cyan-400/50 outline-none
                 shadow-[0_0_15px_rgba(34,211,238,0.25)]
                 focus:shadow-[0_0_25px_rgba(34,211,238,0.6)]
                 focus:border-cyan-300 transition duration-300"
        />

        <button
          id="search-btn"
          type="submit"
          class="absolute right-2 top-1/2 -translate-y-1/2 px-5 py-2 rounded-xl bg-cyan-500 text-black font-medium hover:bg-cyan-400 transition"
        >
          Go
        </button>
      </div>
    </div>
  </main>

  <script src="/scramjet/scramjet.codecs.js"></script>
  <script src="/scramjet/scramjet.config.js"></script>
  <script src="/baremux/index.js"></script>
  
  <script>
    const input = document.getElementById('user-input'); 
    const btn = document.getElementById('search-btn');

    btn.onclick = async (e) => {
      e.preventDefault();
      const url = input.value.trim();
      if (!url) return;

      // Basic URL formatting
      let targetUrl = url;
      if (!url.startsWith('http://') && !url.startsWith('https://')) {
          targetUrl = 'https://www.google.com/search?q=' + encodeURIComponent(url);
          if (url.includes('.') && !url.includes(' ')) {
              targetUrl = 'https://' + url;
          }
      }

      // Initialize connection and redirect
      const conn = new BareMux.BareMuxConnection("/wisp/");
      const encodedUrl = __scramjet$config.prefix + __scramjet$config.codec.encode(targetUrl);
      window.location.href = encodedUrl;
    };
  </script>

</body>
</html>
